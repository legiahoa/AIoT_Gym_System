name: AIoT Gym CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Kéo mã nguồn về
      uses: actions/checkout@v3

    - name: Thiết lập môi trường Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11' 

    - name: Cài đặt thư viện (Dependencies)
      run: |
        python -m pip install --upgrade pip
        # Trỏ đúng vào thư mục Python_Server để cài thư viện
        pip install -r Python_Server/requirements.txt

    - name: Kiểm tra toàn vẹn mã nguồn
      run: |
        # Chỉ quét kiểm tra lỗi cú pháp trong thư mục Python_Server
        python -m compileall Python_Server/
        echo "✅ Toàn bộ mã nguồn Python đã biên dịch thành công không có lỗi cú pháp!"