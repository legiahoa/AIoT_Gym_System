name: AIoT Gym CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Kéo mã nguồn về
      uses: actions/checkout@v3

    - name: Thiết lập môi trường Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11' 

    # --- 1. CACHING: Tăng tốc cực nhanh cho các lần sau ---
    - name: Cài đặt Cache
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Cài đặt thư viện (Dependencies)
      run: |
        python -m pip install --upgrade pip
        pip install -r Python_Server/requirements.txt
        pip install flake8  # Cài thêm công cụ kiểm tra code

    # --- 2. LINTING: Đảm bảo code chuẩn PEP8 ---
    - name: Kiểm tra chất lượng code (Lint)
      run: |
        flake8 Python_Server/ --count --select=E9,F63,F7,F82 --show-source --statistics

    # --- 3. DVC PULL: Lấy mô hình thật về (Giả sử bạn đã config DVC) ---
    # Nếu chưa config remote cho DVC, bạn có thể bỏ qua bước này
    - name: Cài đặt DVC
      run: pip install dvc[gdrive]

    - name: Cấu hình Credentials và Pull mô hình
      env:
        GDRIVE_CREDENTIALS_DATA: ${{ secrets.GDRIVE_CREDENTIALS_DATA }}
      run: |
        cd Python_Server
        
        # 1. Tạo file xác thực
        echo "$GDRIVE_CREDENTIALS_DATA" > gdrive_key.json
        
        # 2. Bật chế độ Service Account (BẮT BUỘC)
        dvc remote modify --local myremote gdrive_use_service_account true
        
        # 3. Chỉ định đường dẫn tới file key (LƯU Ý: có chữ _path)
        dvc remote modify --local myremote gdrive_service_account_json_file_path gdrive_key.json
        
        # 4. Pull dữ liệu
        dvc pull

    # --- 4. MODEL SMOKE TEST: Bước quan trọng nhất của MLOps ---
    - name: Kiểm tra mô hình (Smoke Test)
      run: |
        python -c "import pickle; model = pickle.load(open('Python_Server/squat_model.pkl', 'rb')); print('Model loaded successfully!')"

    - name: Chạy Kiểm thử tự động (Unit Tests)
      run: |
        python -m unittest discover -s Python_Server -p "test_*.py"